<!-- Firebase SDK (loads from the internet; if offline the app still runs in local mode) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --ink:#1f2a44; --muted:#6b7592;
    --brand:#3b5bdb; --brand-dark:#2f49af; --line:#e6e9f2;
    --ok:#37b24d; --warn:#f08c00; --danger:#e03131;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:linear-gradient(180deg,#f7f9fd 0%,#eef1f9 100%);background-attachment:fixed;
       color:var(--ink);line-height:1.6;font-size:17px;min-height:100vh}
  h1{font-size:30px} h2{font-size:21px}
  label{font-size:15px} table{font-size:16px}
  header{background:var(--card);border-bottom:1px solid var(--line);
         padding:12px 24px;display:flex;flex-direction:column;gap:10px;
         position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(31,42,68,.06)}
  header .topbar-row1{display:flex;align-items:center;gap:12px}
  header .brand{font-weight:700;font-size:20px;color:var(--brand);cursor:pointer}
  header nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  header nav a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;cursor:pointer;
         padding:7px 16px;border-radius:8px;background:#f1f3f9;transition:background .12s,color .12s}
  header nav a:hover{background:#e6eaf6;color:var(--brand)}
  header nav a.active{background:var(--brand);color:#fff}
  header nav a.active{background:var(--brand);color:#fff;box-shadow:0 3px 10px rgba(59,91,219,.30)}
  header nav a.link{background:transparent;color:var(--muted)}
  header nav a.link:hover{background:#fdecec;color:#e03131}
  .pill{font-size:12px;padding:3px 12px;border-radius:999px;background:#eef1fb;color:var(--brand);font-weight:600}
  main{max-width:880px;margin:28px auto;padding:0 20px}
  h1{font-size:24px;margin:0 0 4px}
  h2{font-size:18px;margin:24px 0 10px}
  .sub{color:var(--muted);margin:0 0 20px}
  .card{background:var(--card);border:1px solid #edf0f8;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 3px 14px rgba(31,42,68,.06)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
  .stat{background:var(--card);border:1px solid #edf0f8;border-radius:14px;padding:16px;text-align:center;box-shadow:0 3px 14px rgba(31,42,68,.06)}
  .stat .n{font-size:28px;font-weight:700;color:var(--brand)}
  .stat .l{font-size:13px;color:var(--muted)}
  .stat.clickable{cursor:pointer;transition:transform .08s,box-shadow .08s}
  .stat.clickable:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,91,219,.12);border-color:var(--brand)}
  .stat.green{background:#d3f9d8;border:2px solid #51cf66} .stat.green .n{color:#2b8a3e}
  .stat.red{background:#ffe3e3;border:2px solid #ff6b6b}   .stat.red .n{color:#c92a2a}
  .stat.blue{background:#dbe4ff;border:2px solid #5c7cfa}  .stat.blue .n{color:#3b5bdb}
  label{display:block;font-size:13px;font-weight:600;margin:12px 0 4px}
  input,textarea,select{width:100%;padding:11px 12px;border:1px solid #d9deee;border-radius:10px;font:inherit;background:#fff;transition:border-color .12s,box-shadow .12s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,91,219,.16)}
  button,.btn{display:inline-block;background:linear-gradient(135deg,#4763e8,#3b5bdb);color:#fff;border:0;
              padding:11px 20px;border-radius:10px;font:inherit;font-weight:600;cursor:pointer;text-decoration:none;
              box-shadow:0 3px 10px rgba(59,91,219,.28);transition:transform .1s,box-shadow .1s,filter .1s}
  button:hover,.btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 16px rgba(59,91,219,.34)}
  button:active,.btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(59,91,219,.3)}
  .btn.ghost{background:#eef1fb;color:var(--brand);box-shadow:none}
  .btn.ghost:hover{background:#e2e8fb;filter:none;color:var(--brand)}
  .btn.btn-danger{background:#fff0f0;color:var(--danger);box-shadow:none}
  .btn.btn-danger:hover{background:#ffe3e3;filter:none}
  .btn.sm{padding:7px 13px;font-size:13px;box-shadow:0 2px 6px rgba(59,91,219,.22)}
  .btn.sm.ghost{box-shadow:none}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .link{color:var(--brand);text-decoration:none;font-weight:600;cursor:pointer}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);font-size:16px}
  th{color:var(--muted);font-weight:600}
  .badge{font-size:12px;padding:2px 10px;border-radius:999px;font-weight:600}
  .time-tag{font-size:12px;color:var(--muted);white-space:nowrap}
  .quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}
  .chip{background:#edf2ff;color:var(--brand);border:1px solid #bac8ff;border-radius:999px;
    padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .chip:hover{background:var(--brand);color:#fff}
  .qr-select{margin-left:6px;padding:9px 12px;border:1px solid #bac8ff;border-radius:8px;
    background:#edf2ff;color:var(--brand);font-size:15px;font-weight:600;cursor:pointer;max-width:210px}
  .doubt-card{background:#fff;border:1px solid #edf0f8;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 3px 14px rgba(31,42,68,.06)}
  .doubt-card.pending{border-left:6px solid #f03e3e;background:#fff6f6}
  .doubt-card.answered{border-left:6px solid #2f9e44;background:#f3fcf6}
  .dc-head{display:flex;align-items:center;gap:12px}
  .dc-avatar{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}
  .dc-who{flex:1;min-width:0}
  .dc-name{font-weight:700;font-size:17px}
  .dc-meta{font-size:14px;color:var(--muted);margin-top:2px}
  .dc-body{margin:12px 0;font-size:16px;line-height:1.6}
  .dc-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:12px}
  .dc-sub{font-size:14px;color:var(--muted);font-weight:600}
  .day-head{display:flex;align-items:center;gap:10px;margin:20px 0 10px;font-family:inherit;
    font-size:18px;font-weight:700;color:var(--brand);border-bottom:2px solid #dbe4ff;padding-bottom:6px}
  .day-head .day-count{font-size:13px;font-weight:600;color:var(--muted)}
  .filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border:1px solid #edf0f8;
    border-radius:12px;padding:10px 14px;margin-bottom:16px;box-shadow:0 3px 14px rgba(31,42,68,.05)}
  .chat{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto}
  .bubble{max-width:80%;padding:10px 14px;border-radius:14px}
  .bubble.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:4px}
  .bubble.them{align-self:flex-start;background:#eef1fb;color:var(--ink);border-bottom-left-radius:4px}
  .bubble-txt{font-size:15px;line-height:1.4;white-space:pre-wrap}
  .bubble-meta{font-size:11px;opacity:.8;margin-top:4px}
  .bubble.them .bubble-meta{color:var(--muted)}
  .modal-overlay{position:fixed;inset:0;background:rgba(20,26,45,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-box{background:#fff;border-radius:18px;padding:26px;max-width:440px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .modal-title{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .modal-sub{color:var(--muted);font-size:15px;margin:0 0 14px;line-height:1.4}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .live-clock{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;
    padding:8px 16px;border-radius:10px;font-weight:600;font-variant-numeric:tabular-nums;margin-bottom:8px}
  .header-clock{margin-left:auto;font-size:16px;font-weight:700;color:#fff;
    background:var(--brand);padding:9px 18px;border-radius:10px;font-variant-numeric:tabular-nums;
    white-space:nowrap;box-shadow:0 2px 6px rgba(59,91,219,.35)}
  .badge.open{background:#ffe8cc;color:#e8590c}
  .badge.assigned{background:#d0ebff;color:#1864ab}
  .badge.answered{background:#d3f9d8;color:#2f9e44}
  tr.answered-row{background:#e3fcec}
  tr.pending-row{background:#ffe9e9}
  tr.answered-row td:first-child{box-shadow:inset 5px 0 0 #2f9e44}
  tr.pending-row td:first-child{box-shadow:inset 5px 0 0 #f03e3e}
  .msg{padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:14px}
  .msg.success{background:#ebfbee;color:#2b8a3e}
  .msg.error{background:#fff5f5;color:#c92a2a}
  .msg.warning{background:#fff9db;color:#e67700}
  .msg.info{background:#e7f5ff;color:#1864ab}
  .muted{color:var(--muted);font-size:14px}
  .empty{text-align:center;color:var(--muted);padding:30px}
  .center-card{max-width:430px;margin:48px auto;box-shadow:0 12px 40px rgba(31,42,68,.12)}
  .demo-list{font-size:13px;color:var(--muted);margin-top:14px;line-height:1.9}
  .demo-list code{background:#f0f2f8;padding:1px 6px;border-radius:5px;color:var(--ink)}
  .login-tabs{display:flex;gap:6px;background:#eef1fb;padding:5px;border-radius:12px;margin-bottom:14px}
  .login-tab{flex:1;background:transparent;color:var(--muted);padding:9px;border-radius:9px;font-size:14px;font-weight:600;box-shadow:none;transition:background .12s,color .12s}
  .login-tab:hover{background:#e1e6fa;color:var(--brand);filter:none;transform:none}
  .login-tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 6px rgba(31,42,68,.12)}
  .thumb{max-height:120px;border-radius:8px;border:1px solid var(--line);margin-top:8px}
  .doubt-img{max-width:100%;max-height:420px;border-radius:10px;border:1px solid var(--line);
    margin-top:8px;display:block;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .file-tag{display:inline-block;background:#f0f2f8;padding:4px 10px;border-radius:6px;font-size:13px;margin-top:6px}
  .cloud-badge{position:fixed;bottom:12px;right:12px;background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:50}
  #offlineBar{background:#e03131;color:#fff;text-align:center;padding:10px 14px;font-size:14px;font-weight:600;line-height:1.4}
  #offlineBar button{background:#fff;color:#e03131;border:0;border-radius:6px;padding:4px 12px;font-weight:700;margin-left:8px;cursor:pointer}
  .student-hero{display:flex;align-items:center;gap:18px;
    background:linear-gradient(135deg,#3b5bdb,#5c7cfa);color:#fff;padding:24px;border-radius:16px;
    margin-bottom:18px;box-shadow:0 8px 20px rgba(59,91,219,.28)}
  .student-hero .avatar{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;flex-shrink:0}
  .student-hero h1{color:#fff;margin:0 0 6px}
  .student-hero .hero-line{font-size:16px;opacity:.96;margin-top:2px}
  .big-ask{width:100%;font-size:19px;padding:16px;margin-bottom:10px}
  .ecp-logo{display:block;margin:0 auto 6px;width:130px;height:auto}
  .brand-logo{height:34px;width:auto;vertical-align:middle;margin-right:8px}
  .brand-wrap{display:flex;align-items:center;cursor:pointer}
  @media (max-width:640px){
    body{font-size:16px}
    h1{font-size:25px} h2{font-size:19px}
    header{padding:10px 14px}
    header .brand{font-size:18px}
    main{margin:18px auto;padding:0 12px}
    .card{padding:14px;overflow-x:auto}
    .grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
    th,td{padding:9px;font-size:15px}
    header nav a{padding:7px 12px;font-size:13px}
    .header-clock{font-size:14px;padding:7px 12px}
    /* tables stay readable: let wide ones scroll inside the card */
    .card table{min-width:520px}
  }
</style>
</head>

const SUBJECTS = {maths:'Maths', english:'English', reasoning:'Reasoning', gs:'GS'};
const subjLabel = k => SUBJECTS[k] || 'Other';
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
/* Batch code from month, e.g. January -> ELTJ-01, February -> ELTF-02 */
function batchCodeFor(m){
  const i = MONTHS.indexOf(m);
  return i < 0 ? '' : 'ELT' + m[0].toUpperCase() + '-' + String(i+1).padStart(2,'0');
}
function batchLabel(m){
  const c = batchCodeFor(m);
  return m ? (c ? `${m} (${c})` : m) : '—';
}

/* ---------- Student ↔ Admin messaging ---------- */
function sendStudentMessage(){
  const t = el('msg_text').value.trim();
  if(!t){ flash('Please type a message.', 'error'); return render(); }
  db.messages.push({id:nextId(), studentId:db.currentUser.id, from:'student', text:t, when:new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}), createdAt:Date.now()});
  flash('Message sent to admin.');
  render();
}

/* ---------- Auto-routing: assign a doubt to a matching faculty ---------- */
function autoAssign(doubt){
  const student = userById(doubt.studentId);
  // route by the classroom chosen on the doubt; fall back to the student's batch
  const classroom = doubt.classroom || (student ? student.batchName : null);
  const approvedFaculty = db.users.filter(u => u.role==='faculty' && u.approved);
  const matches = approvedFaculty.filter(u => u.classroom === classroom);
  const pool = matches.length ? matches : [];
  if(!pool.length) return null;
  // pick the faculty with the fewest assigned doubts (simple load balancing)
  const load = f => db.doubts.filter(d => d.facultyId === f.id).length;
  pool.sort((a,b) => load(a) - load(b));
  const chosen = pool[0];
  doubt.facultyId = chosen.id;
  doubt.status = 'assigned';
  return chosen;
}

  const isImg = f.type.startsWith('image/');
  if(isImg){
    const reader = new FileReader();
    reader.onload = e => {
      window._pendingFile = {name:f.name, dataUrl:e.target.result, isImage:true};
      el('filePreview').innerHTML = '<img class="thumb" src="'+e.target.result+'">';
    };
    reader.readAsDataURL(f);
  } else {
    window._pendingFile = {name:f.name, dataUrl:null, isImage:false};
    el('filePreview').innerHTML = '<span class="file-tag">📎 '+esc(f.name)+'</span>';

/* ---------- Date filter for doubts (classroom + admin) ---------- */
let doubtFilter = 'all';        // all | today | yesterday | week | date
let doubtFilterDate = '';       // YYYY-MM-DD when a specific date is picked
function setDoubtFilter(f){ doubtFilter = f; doubtFilterDate = ''; render(); }
function setDoubtFilterDate(v){ doubtFilterDate = v; doubtFilter = v ? 'date' : 'all'; render(); }
function passesDateFilter(ts){
  if(doubtFilter === 'all') return true;
  const d = new Date(ts||0); d.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - d) / 86400000);
  if(doubtFilter === 'today')     return diff === 0;
  if(doubtFilter === 'yesterday') return diff === 1;
  if(doubtFilter === 'week')      return diff >= 0 && diff < 7;
  if(doubtFilter === 'date' && doubtFilterDate){
    const sel = new Date(doubtFilterDate); sel.setHours(0,0,0,0);
    return d.getTime() === sel.getTime();
  }
  return true;
}
function dateFilterBar(){
  const btn = (f,label) => `<button class="btn sm ${doubtFilter===f?'':'ghost'}" onclick="setDoubtFilter('${f}')">${label}</button>`;
  return `<div class="filter-bar">
    <span class="muted" style="font-size:14px">Show:</span>
    ${btn('all','All')}${btn('today','Today')}${btn('yesterday','Yesterday')}${btn('week','This week')}
    <span class="muted" style="font-size:14px;margin-left:6px">Pick a date:</span>
    <input type="date" value="${doubtFilterDate}" onchange="setDoubtFilterDate(this.value)" style="width:auto;padding:7px 10px">
    ${ doubtFilter!=='all' ? `<button class="btn sm ghost" onclick="setDoubtFilter('all')">✕ Clear</button>` : '' }
  </div>`;
}

/* Build a CSV cell, quoting/escaping when needed. */
function csvCell(v){ v = (v==null ? '' : String(v)); return /[",\r\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }

/* Admin downloads all student data as a CSV file (opens in Excel). */
function downloadStudents(){
  const students = db.users.filter(u => u.role==='student');
  if(!students.length){ flash('No students to download yet.', 'warning'); return render(); }
  const headers = ['Name','Contact Number','Batch Name','Batch Code'];
  const rows = students.map(s => [s.name||s.username, s.contact||'', s.batchName||'', batchCodeFor(s.batchName)||'']);
  const csv = '\ufeff' + [headers, ...rows].map(r => r.map(csvCell).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'students.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

    ${flashHtml()}

    <label>New password</label>
    <input id="f_new" type="password" placeholder="At least 6 characters">
    <label>Confirm new password</label>

    <button style="margin-top:16px;width:100%" onclick="resetPassword()">Reset password</button>

function resetPassword(){
  const contact = el('f_contact').value.trim();
  const name    = el('f_name').value.trim();
  const np      = el('f_new').value;
  const np2     = el('f_new2').value;
  if(!contact || !name || !np){ flash('Please fill in all fields.', 'error'); return render(); }
  if(np.length < 6){ flash('New password must be at least 6 characters.', 'error'); return render(); }
  if(np !== np2){ flash('The two passwords do not match.', 'error'); return render(); }
  const user = db.users.find(u => u.role==='student' && u.username===contact
                              && (u.name||'').toLowerCase() === name.toLowerCase());
  if(!user){ flash('No student found with that contact number and name.', 'error'); return render(); }
  user.password = np;
  flash('Password reset. Please sign in with your new password.');
  go('login');
}

        <td>${esc(s.batchName || '—')}</td><td>${esc(batchCodeFor(s.batchName) || '—')}</td></tr>`).join('')

      <tr><th>Username</th><th>Classroom</th><th>Status</th></tr>

        <td><span class="badge ${f.approved?'answered':'open'}">${f.approved?'Active':'Pending'}</span></td></tr>`).join('') }
      </table></div>`);
  }

  if(adminPanel === 'classrooms'){
    return wrap(`Classrooms (${db.classrooms.length})`, `
      <div class="card">
        <p class="muted" style="margin-top:0">Add a classroom with the login the teacher uses to sign in and clarify its doubts.</p>
        <label>Classroom name</label>
        <input id="c_name" placeholder="e.g. New Building Classroom">

        <label>Default message (shown in the classroom login)</label>
        <textarea id="c_msg" rows="2" placeholder="e.g. Welcome! Post your doubts here."></textarea>
        <button style="margin-top:12px" onclick="addClassroom()">Add classroom</button>
      </div>
      <div class="card">${ db.classrooms.length ? db.classrooms.map(c => {
        const login = db.users.find(u => u.role==='faculty' && u.classroom===c.name);
        const stuCount = db.users.filter(u => u.role==='student' && u.batchName===c.name).length;
        const editing = editMsgId === c.id;
        return `<div style="padding:10px 0;border-bottom:1px solid var(--line)">
          <div class="row" style="border:0;padding:0">
            <span>${esc(c.name)} <span class="muted">· login: ${login?esc(login.username):'—'}</span></span>
            <button class="btn sm btn-danger" onclick="removeClassroom(${c.id})">Remove</button>
          </div>
          ${ editing
            ? `<textarea id="cm_${c.id}" rows="2" style="margin-top:8px">${esc(c.message||'')}</textarea>
               <button class="btn sm" style="margin-top:6px" onclick="saveClassroomMessage(${c.id})">Save message</button>`
            : `<div class="muted" style="margin-top:6px">💬 ${esc(c.message||'no message')}
               <span class="link" style="font-size:13px" onclick="startEditMessage(${c.id})">Edit</span></div>` }
        </div>`;
      }).join('') : '<div class="empty">No classrooms yet.</div>' }</div>`);
  }

  if(adminPanel === 'doubts' || adminPanel === 'answered' || adminPanel === 'open'){
    let list = db.doubts, title = `All Doubts`;
    if(adminPanel === 'answered'){ list = db.doubts.filter(d=>d.status==='answered'); title = 'Answered Doubts'; }
    if(adminPanel === 'open'){ list = db.doubts.filter(d=>d.status!=='answered'); title = 'Not Answered Doubts'; }
    list = list.filter(d => passesDateFilter(d.createdAt));
    // group doubts classroom-wise
    const order = db.classrooms.map(c => c.name);
    const groups = {};
    list.forEach(d => { const k = d.classroom || 'Unassigned'; (groups[k] = groups[k] || []).push(d); });
    const keys = Object.keys(groups).sort((a,b) => {
      const ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia<0?999:ia) - (ib<0?999:ib);
    });
    const section = (room, ds) => {
      ds = ds.slice().sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
      const total = ds.length, CAP = 100;
      const shown = ds.slice(0, CAP);
      return `<h2>${esc(room)} (${total})</h2>
      <div class="card"><table>
        <tr><th>Doubt</th><th>Student</th><th>Subject</th><th>Asked</th><th>Status</th></tr>
        ${ shown.map(d => `<tr>
          <td>${esc(d.title)}</td><td>${esc(uname(d.studentId))}</td><td>${subjLabel(d.subject)}</td>
          <td><span class="time-tag" title="${fmtTime(d.createdAt)}">${d.createdAt?fmtTime(d.createdAt):'—'}</span></td>
          <td><span class="badge ${d.status}">${d.status}</span></td></tr>`).join('') }
      </table>
      ${ total > CAP ? `<p class="muted" style="margin:10px 0 0">Showing the latest ${CAP} of ${total}. Use the date filter above to narrow it down.</p>` : '' }
      </div>`;
    };
    return wrap(`${title} (${list.length})`,
      dateFilterBar() + (keys.length ? keys.map(k => section(k, groups[k])).join('')
                  : '<div class="card empty">No doubts for this filter.</div>'));
  }

  if(adminPanel === 'announcements'){
    const tag = b => (b && b!=='all') ? `<span class="badge assigned">${esc(b)} batch</span>` : '<span class="badge assigned">All batches</span>';
    return wrap(`Classroom Announcements (${db.announcements.length})`,
      db.announcements.length ? db.announcements.map(a => `<div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px">
          <p style="margin:0">${esc(a.text)}</p>${tag(a.batch)}
        </div>
        <p class="muted" style="margin:6px 0 0">— ${esc(uname(a.facultyId))} · ${a.when}</p></div>`).join('')
      : '<div class="card empty">No announcements yet.</div>');
  }

  if(adminPanel === 'messages'){
    const ids = [...new Set(db.messages.map(m => m.studentId))];
    // most recently active conversations first
    ids.sort((a,b) => {
      const la = Math.max(...db.messages.filter(m=>m.studentId===a).map(m=>m.createdAt||0));
      const lb = Math.max(...db.messages.filter(m=>m.studentId===b).map(m=>m.createdAt||0));
      return lb - la;
    });
    return wrap(`Student Feedback (${ids.length})`,
      ids.length ? ids.map(sid => {
        const s = userById(sid);
        const name = s ? (s.name || s.username) : 'Unknown student';
        const thread = db.messages.filter(m => m.studentId === sid);
        return `<div class="card">
          <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:8px">
            <strong>${esc(name)}</strong>
            <span class="muted">📞 ${esc(s?(s.contact||'—'):'—')} · ${esc(batchLabel(s?s.batchName:''))}</span>
          </div>
          <div class="chat">${msgBubbles(thread, 'admin')}</div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <textarea id="rep_${sid}" rows="2" placeholder="Type a reply..." style="flex:1"></textarea>
            <button class="btn" onclick="replyToStudent(${sid})">Reply</button>
          </div>
        </div>`;
      }).join('')
      : '<div class="card empty">No student messages yet.</div>');
  }

  if(adminPanel === 'forwarded'){
    return wrap(`Forwarded to Admin (${db.forwarded.length})`,
      db.forwarded.length ? db.forwarded.map(f => `<div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px">
          <strong>${esc(f.studentName)}</strong>
          <span class="muted">${f.when}</span>
        </div>
        <p style="margin:6px 0 0">📞 ${esc(f.contact)||'—'} · Batch: ${esc(batchLabel(f.batch))} · ${esc(f.classroom)||'—'}</p>
        <p style="margin:6px 0 0">❓ <em>${esc(f.doubtText)}</em> <span class="muted">(${subjLabel(f.subject)})</span></p>
        <p class="muted" style="margin:6px 0 0">Forwarded by ${esc(f.by)}</p>
      </div>`).join('')
      : '<div class="card empty">No forwarded details yet.</div>');
  }

  if(adminPanel === 'replies'){
    return wrap(`Default Replies (${db.quickReplies.length})`, `
      <div class="card">
        <p class="muted" style="margin-top:0">These quick replies appear in the classroom login when clarifying a doubt, so teachers can send them in one tap.</p>
        <label>New default reply</label>
        <input id="qr_text" placeholder="e.g. After completion of class, visit the office.">
        <button style="margin-top:12px" onclick="addQuickReply()">Add reply</button>
      </div>
      <div class="card">${ db.quickReplies.length ? db.quickReplies.map(q =>
        `<div class="row"><span>💬 ${esc(q.text)}</span>
          <button class="btn sm btn-danger" onclick="removeQuickReply(${q.id})">Remove</button></div>`).join('')
        : '<div class="empty">No default replies yet.</div>' }</div>`);
  }

  if(adminPanel === 'notifications'){
    return wrap(`Admin Notifications (${db.notifications.length})`, `
      <div class="card">
        <label>Post a new notification</label>
        <textarea id="n_text" rows="3" placeholder="Message for all students and faculty"></textarea>
        <button style="margin-top:10px" onclick="postNotification()">Post notification</button>
      </div>
      ${ db.notifications.length ? db.notifications.map(n => `<div class="card">
        <p style="margin:0">${esc(n.text)}</p>
        <p class="muted" style="margin:6px 0 0">${n.when}</p></div>`).join('')
      : '<div class="card empty">No notifications yet.</div>' }`);
  }

  return back + '<div class="card empty">Unknown view.</div>';
}

        <span class="time-tag" title="${fmtTime(d.createdAt)}">🕒 ${d.createdAt?timeAgo(d.createdAt):'—'}</span>
        <span style="flex:1"></span>
        ${ answered
           ? (lastAns ? `<span class="muted" style="font-size:14px">Replied: “${esc(lastAns)}”</span>` : '')
           : `<select class="qr-select" onchange="quickReplyTo(${d.id}, this.value)"><option value="">⚡ Quick reply…</option>${replyOpts}</select>
              <button class="btn sm" onclick="openAnswer(${d.id})">Answer</button>` }
        ${ d.forwarded
           ? '<span class="badge assigned" title="Sent to admin">⤴ forwarded</span>'
           : `<button class="btn sm ghost" title="Forward student details to admin" onclick="forwardToAdmin(${d.id})">⤴ Forward</button>` }
      </div>
    </div>`;
  };
  // ---- group the doubts day-wise ----
  const dayKey = ts => { const d = new Date(ts||0); d.setHours(0,0,0,0); return d.getTime(); };
  const dayLabel = ts => {
    if(!ts) return 'Undated';
    const d = new Date(ts); d.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((today - d) / 86400000);
    if(diff === 0) return 'Today';
    if(diff === 1) return 'Yesterday';
    return d.toLocaleDateString('en-IN', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
  };
  const groups = {};
  list.forEach(d => { const k = dayKey(d.createdAt); (groups[k] = groups[k] || []).push(d); });
  const keys = Object.keys(groups).map(Number).sort((a,b) => assignedSort==='oldest' ? a-b : b-a);
  const grouped = keys.map(k => {
    const ds = groups[k];
    const pending = ds.filter(x => x.status !== 'answered').length;
    return `<div class="day-head">${dayLabel(k)}
        <span class="day-count">${ds.length} doubt${ds.length>1?'s':''}${pending?` · ${pending} pending`:''}</span></div>
      ${ ds.map(card).join('') }`;
  }).join('');

  return `<h1>Assigned Doubts</h1>
    <p class="sub"><span style="color:#2b8a3e">Green</span> = answered, <span style="color:#e03131">red</span> = pending. Grouped by day.</p>
    ${dateFilterBar()}
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      <span class="muted" style="font-size:14px">Sort by day:</span>
      ${sortBtn('newest','Newest first')}${sortBtn('oldest','Oldest first')}
    </div>
    ${ list.length ? grouped : '<div class="card empty">No doubts for this filter.</div>' }`;
}

/* ---------- Time helpers ---------- */
function fmtTime(ts){
  if(!ts) return '';
  return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
function timeAgo(ts){
  if(!ts) return '';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s < 60) return 'just now';
  const m = Math.floor(s/60); if(m < 60) return m + ' min ago';
  const h = Math.floor(m/60); if(h < 24) return h + ' hr ago';
  const d = Math.floor(h/24); return d + ' day' + (d>1?'s':'') + ' ago';
}
function doubtRow(d){
  return `<div class="row">
    <span class="link" onclick="openDoubt(${d.id})">${esc(d.title)}</span>
    <span style="display:flex;gap:8px;align-items:center">
      ${ d.createdAt ? `<span class="time-tag" title="${fmtTime(d.createdAt)}">🕒 ${timeAgo(d.createdAt)}</span>` : '' }
      <span class="badge ${d.status}">${d.status}</span>
    </span></div>`;
}
function attachmentHtml(a){
  if(!a) return '';
  if(a.isImage) return `<h2>📷 Image attached by the student</h2>
    <img class="doubt-img" src="${a.dataUrl}" alt="student attachment">`;
  return `<h2>Attachment</h2><span class="file-tag">📎 ${esc(a.name)}</span>`;

function flashHtml(){

/* ---------- Live sync ----------
   • Same computer, different tabs  → BroadcastChannel (instant, no setup)
   • Different devices (phone/laptop) → Firebase Realtime Database
   IMPORTANT: data is synced PER ITEM (each doubt/user/etc. under its own key),
   and remote changes are MERGED into local data. This means two devices editing
   different things never overwrite each other — a classroom's reply and a new
   student's account both survive. */
const SHARED_COLLECTIONS = ['users','doubts','classrooms','announcements','notifications','materials','career','quickReplies','forwarded','messages'];
const SHARED_KEYS = SHARED_COLLECTIONS.concat(['_seq']);   // (kept for BroadcastChannel)
let _bc = null; try { _bc = new BroadcastChannel('doubtdesk_live'); } catch(e) {}
let _root = null;             // Firebase 'doubtdesk' node, set once connected
let _applyingRemote = false;
let _synced = {};             // { collection: { id: jsonString } } — what the cloud already has
function _snap(){ const s = {}; SHARED_KEYS.forEach(k => s[k] = db[k]); return s; }

function refreshSynced(){
  SHARED_COLLECTIONS.forEach(col => {
    _synced[col] = {};
    (db[col] || []).forEach(it => { _synced[col][it.id] = JSON.stringify(it); });
  });
}

/* BroadcastChannel path: whole-state apply for instant same-machine sync. */
function applyRemoteState(data){
  if(!data) return;
  _applyingRemote = true;
  SHARED_KEYS.forEach(k => { if(data[k] !== undefined) db[k] = data[k]; });
  if(db.currentUser){ const cu = (db.users||[]).find(u => u.id === db.currentUser.id); if(cu) db.currentUser = cu; }
  refreshSynced();
  _applyingRemote = false;
  const t = document.activeElement && document.activeElement.tagName;
  if(t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT') return;
  scheduleRender();
}

/* Firebase path: rebuild ONE collection from the cloud and merge it in. */
function normDoubt(d){
  if(!d) return d;
  if(d.answers === undefined || d.answers === null) d.answers = [];
  else if(!Array.isArray(d.answers)) d.answers = Object.keys(d.answers).map(k => d.answers[k]);
  return d;
}
/* Coalesce a burst of updates (10 collection listeners fire at once on load)
   into a single repaint on the next frame — keeps the admin panel snappy. */
let _renderQueued = false;
function scheduleRender(){
  if(_renderQueued) return;
  _renderQueued = true;
  requestAnimationFrame(() => { _renderQueued = false; render(); });
}
function rebuildCollection(col, map){
  _applyingRemote = true;
  let arr = map ? Object.keys(map).map(k => map[k]) : [];
  if(col === 'doubts'){ arr = arr.map(normDoubt); arr.sort((a,b) => (b.createdAt||0) - (a.createdAt||0)); }   // newest first
  db[col] = arr;
  _synced[col] = {}; arr.forEach(it => { _synced[col][it.id] = JSON.stringify(it); });
  if(col === 'users' && db.currentUser){
    const cu = arr.find(u => u.id === db.currentUser.id); if(cu) db.currentUser = cu;
  }
  _applyingRemote = false;
  const t = document.activeElement && document.activeElement.tagName;
  if(t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT') return;
  scheduleRender();
}

function pushSyncIfChanged(){
  if(_applyingRemote) return;              // don't echo back what we just received
  let changedForBc = false;
  const updates = {};
  // Walk each item once: detect changes for BOTH the tab-sync and the cloud write
  SHARED_COLLECTIONS.forEach(col => {
    const sc = _synced[col] || (_synced[col] = {});
    const present = {};
    (db[col] || []).forEach(it => {
      present[it.id] = 1;
      const js = JSON.stringify(it);
      if(sc[it.id] !== js){
        changedForBc = true;
        if(_root) updates[col + '/' + it.id] = JSON.parse(js);
        sc[it.id] = js;
      }
    });
    Object.keys(sc).forEach(id => {         // items removed locally
      if(!present[id]){
        changedForBc = true;
        if(_root) updates[col + '/' + id] = null;
        delete sc[id];
      }
    });
  });
  if(!changedForBc) return;                 // nothing changed → no work at all
  try { _bc && _bc.postMessage({type:'state', data:_snap()}); } catch(e) {}
  if(_root && Object.keys(updates).length){ try { _root.update(updates); } catch(e){} }
}

if(_bc){
  _bc.onmessage = (ev) => {
    const m = ev.data; if(!m) return;
    if(m.type === 'request'){ try { _bc.postMessage({type:'state', data:_snap()}); } catch(e) {} return; }
    if(m.type === 'state'){ applyRemoteState(m.data); }
  };
}

/* Use a config saved from the in-app setup screen, else the one coded above. */
function loadSavedFbConfig(){
  try { const s = localStorage.getItem('doubtdesk_fb_config'); if(s) return JSON.parse(s); } catch(e){}
  return null;
}
function effectiveFbConfig(){
  // A config baked into the file wins; otherwise use one saved via the in-app setup screen.
  if(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey) return FIREBASE_CONFIG;
  return loadSavedFbConfig() || FIREBASE_CONFIG;
}

/* Connect to Firebase if configured and the SDK loaded. */
let cloudStatus = 'local';   // 'local' | 'cloud'
let cloudReason = '';        // why we're still local (for diagnosis)
let _fbTries = 0;
let _graceOver = false;      // don't show the offline bar during the first few seconds
setTimeout(() => { _graceOver = true; updateCloudBadge(); }, 7000);
function initFirebase(){
  if(typeof firebase === 'undefined'){ cloudReason = 'Firebase SDK did not load (no internet, blocked, or old cached file).'; updateCloudBadge(); retryFirebase(); return; }
  const cfg = effectiveFbConfig();
  if(!cfg.apiKey || !cfg.databaseURL){ cloudReason = 'No Firebase config in this file (you may have uploaded an older copy).'; updateCloudBadge(); return; }
  try {
    if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(cfg);
    const ref = firebase.database().ref('doubtdesk');
    ref.once('value').then(snap => {
      const data = snap.val();
      if(!data || !data.users){
        const seed = {};
        SHARED_COLLECTIONS.forEach(col => { (db[col]||[]).forEach(it => { seed[col + '/' + it.id] = JSON.parse(JSON.stringify(it)); }); });
        try { ref.update(seed); } catch(e){}
        refreshSynced();
      } else {
        SHARED_COLLECTIONS.forEach(col => rebuildCollection(col, data[col]));
      }
      SHARED_COLLECTIONS.forEach(col => {
        ref.child(col).on('value', s => { rebuildCollection(col, s.val()); });
      });
      _root = ref;
      cloudStatus = 'cloud'; cloudReason = '';
      updateCloudBadge();
    }).catch(e => { cloudReason = 'Cloud read blocked: ' + (e && e.message ? e.message : e) + ' — check Realtime Database Rules.'; updateCloudBadge(); console.warn('Firebase read failed:', e); retryFirebase(); });
  } catch(e){ cloudReason = 'Init failed: ' + (e && e.message ? e.message : e); updateCloudBadge(); console.warn('Firebase init failed:', e); retryFirebase(); }
}
/* Auto-retry the connection a few times (helps flaky mobile networks). */
function retryFirebase(){
  if(cloudStatus === 'cloud' || _fbTries >= 5) return;
  _fbTries++;
  setTimeout(() => { if(cloudStatus !== 'cloud') initFirebase(); }, 4000);
}
function updateCloudBadge(){
  const el = document.getElementById('cloudBadge');
  if(el){
    el.textContent = cloudStatus === 'cloud' ? '🟢 Live (cloud)' : '🟡 Local only · tap';
    el.style.color = cloudStatus === 'cloud' ? '#2b8a3e' : '#e67700';
    el.title = cloudStatus === 'cloud' ? 'Connected — shared live across devices' : (cloudReason || 'Not connected to the cloud');
    el.onclick = () => {
      if(cloudStatus === 'cloud'){ alert('🟢 Connected to the cloud — data is shared live across devices.'); return; }
      alert('🟡 Not connected.\n\nReason: ' + (cloudReason || 'unknown') + '\n\nTip: make sure you have internet, then reload the page.');
      if(!db.currentUser){ view='cloudsetup'; render(); }
    };
    el.style.cursor = 'pointer';
  }
  // Big red warning bar when we SHOULD be on the cloud but aren't (after a grace period)
  const bar = document.getElementById('offlineBar');
  if(bar){
    const configured = (effectiveFbConfig().apiKey || '').length > 0;
    if(configured && cloudStatus !== 'cloud' && _graceOver){
      bar.style.display = 'block';
      bar.innerHTML = '⚠ You are OFFLINE — your account and doubts will NOT be saved online until you reconnect. Check your internet, then reload.' +
        '<button onclick="location.reload()">Reload</button>';
    } else {
      bar.style.display = 'none';
    }
  }
}

/* In-app cloud setup: paste the Firebase config, no code editing needed. */
function viewCloudSetup(){
  const c = effectiveFbConfig();
  const connected = cloudStatus === 'cloud';
  return `<div class="card center-card">
    <h1>☁ Connect to the cloud</h1>
    <p class="sub">Paste your Firebase config to share doubts live across devices.
      Get it free from <strong>console.firebase.google.com</strong> → Project settings → Your apps.</p>
    ${flashHtml()}
    <div class="msg ${connected?'success':'info'}">Status: ${connected?'🟢 Connected (live across devices)':'🟡 Not connected (this device only)'}</div>
    <label>1) Paste your whole firebaseConfig here</label>
    <textarea id="fb_paste" rows="8" placeholder='apiKey: "AIza...",
authDomain: "your-app.firebaseapp.com",
databaseURL: "https://your-app-default-rtdb.firebaseio.com",
projectId: "your-app",
appId: "1:123...:web:abc..."'></textarea>
    <label>2) Database URL (from Realtime Database — must contain firebaseio.com)</label>
    <input id="fb_dburl" value="${esc(c.databaseURL||'')}" placeholder="https://your-app-default-rtdb.firebaseio.com">
    <button style="margin-top:14px;width:100%" onclick="saveFbConfig()">Save & connect</button>
    ${ loadSavedFbConfig() ? `<button class="btn ghost" style="margin-top:10px;width:100%" onclick="clearFbConfig()">Disconnect / clear saved config</button>` : '' }
    <p class="muted" style="text-align:center;margin-top:14px"><span class="link" onclick="go('login')">← Back to sign in</span></p>
  </div>`;
}
function saveFbConfig(){
  const text = el('fb_paste').value || '';
  const grab = k => { const m = text.match(new RegExp(k + '\\s*:\\s*["\\\']([^"\\\']+)["\\\']')); return m ? m[1] : ''; };
  const cfg = {
    apiKey:      grab('apiKey'),
    authDomain:  grab('authDomain'),
    databaseURL: grab('databaseURL') || (el('fb_dburl').value || '').trim(),
    projectId:   grab('projectId'),
    appId:       grab('appId')
  };
  if(!cfg.apiKey){ flash('Could not find apiKey — paste the full config block.', 'error'); return render(); }
  if(!cfg.databaseURL){ flash('Please add your Database URL (contains firebaseio.com).', 'error'); return render(); }
  try { localStorage.setItem('doubtdesk_fb_config', JSON.stringify(cfg)); }
  catch(e){ flash('Could not save on this browser.', 'error'); return render(); }
  flash('Saved! Reconnecting…');
  setTimeout(() => location.reload(), 700);
}
function clearFbConfig(){
  try { localStorage.removeItem('doubtdesk_fb_config'); } catch(e){}
  setTimeout(() => location.reload(), 300);
}
/* ---------- Live clock (ticks every second on the classroom dashboard) ---------- */
function clockText(){
  return new Date().toLocaleString('en-IN',
    {weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(() => {
  const c = document.getElementById('liveClock');
  if(c) c.textContent = clockText();
}, 1000);

refreshSynced();   // don't re-send the seed data on first paint
(function(){ const bl = document.getElementById('brandLogo'); if(bl) bl.src = ECP_LOGO; })();
render();
if(_bc){ try { _bc.postMessage({type:'request'}); } catch(e) {} }  // pull existing data from other open tabs
initFirebase();   // connect to the cloud if configured (enables cross-device live sync)
updateCloudBadge();
</script>
